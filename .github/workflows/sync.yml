name: Sync to Hugging Face
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.MYWRITETOKEN1 }}
        run: git push --force https://johnboscokibet:$HF_TOKEN@huggingface.co/spaces/johnboscokibet/mlops-production-pipeline main
